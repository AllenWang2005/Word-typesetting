name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Pandoc (for LaTeX→OMML round-trip tests)
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: Byte-compile scripts
        run: python -m py_compile scripts/audit_docx_format.py scripts/normalize_docx.py scripts/replace_math.py examples/make_sample.py
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
